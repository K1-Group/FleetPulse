name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME: fleetpulse
  APP_NAME: ${{ secrets.AZURE_APP_NAME }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR via Azure CLI
        run: az acr login --name k1fleetpulseacr

      - name: Build and push image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                       -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Smoke test
        run: |
          check_url() {
            local name="$1"
            local url="$2"
            local status=""

            for attempt in $(seq 1 12); do
              status=$(curl -sS -o /dev/null -w "%{http_code}" "$url" || true)
              echo "$name attempt $attempt status: $status"
              if [ "$status" = "200" ]; then
                return 0
              fi
              sleep 15
            done

            echo "$name smoke test failed after warm-up retries. Last status: $status"
            return 1
          }

          check_url "Health check" "https://${{ env.APP_NAME }}.azurewebsites.net/api/health"
          check_url "Power BI dashboard preview" "https://${{ env.APP_NAME }}.azurewebsites.net/api/powerbi/dashboard-preview"
          echo "Deployment successful!"
