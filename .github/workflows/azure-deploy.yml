name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME: fleetpulse
  APP_NAME: ${{ secrets.AZURE_APP_NAME }}
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run backend Lane Stability tests
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest
          PYTHONPATH=backend pytest \
            backend/tests/test_fabric_warehouse_sql_client.py \
            backend/tests/test_lakehouse_lane_stability_service.py \
            backend/tests/test_lane_stability_router.py \
            backend/tests/test_qbo_financial_snapshot_service.py \
            backend/tests/test_seat_kpi_feed_service.py \
            backend/tests/test_control_tower_router.py \
            backend/tests/test_hr_recruiting_service.py \
            backend/tests/test_hr_recruiting_router.py \
            backend/tests/test_hr_call_analysis_service.py \
            backend/tests/test_hr_call_analysis_router.py \
            backend/tests/test_auth_session_router.py \
            backend/tests/test_fleet_hubs.py \
            backend/tests/test_app_monitor_startup.py

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR via Azure CLI
        run: az acr login --name k1fleetpulseacr

      - name: Build and push image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                       -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Configure live HR SharePoint runtime settings
        env:
          AZURE_APP_NAME: ${{ env.APP_NAME }}
          AZURE_RESOURCE_GROUP: ${{ env.AZURE_RESOURCE_GROUP }}
          AZURE_KEY_VAULT_NAME: ${{ secrets.AZURE_KEY_VAULT_NAME }}
          FLEETPULSE_GRAPH_TENANT_ID_SECRET_NAME: ${{ secrets.FLEETPULSE_GRAPH_TENANT_ID_SECRET_NAME }}
          FLEETPULSE_GRAPH_CLIENT_ID_SECRET_NAME: ${{ secrets.FLEETPULSE_GRAPH_CLIENT_ID_SECRET_NAME }}
          FLEETPULSE_GRAPH_CLIENT_SECRET_SECRET_NAME: ${{ secrets.FLEETPULSE_GRAPH_CLIENT_SECRET_SECRET_NAME }}
          HR_CALL_ANALYSIS_SHAREPOINT_ENABLED: "true"
          HR_CALL_ANALYSIS_SHAREPOINT_SITE_URL: https://netorgft3187866.sharepoint.com/sites/K1SOPsandProcedures
          HR_CALL_ANALYSIS_SHAREPOINT_FOLDER_PATH: Grasshopper/Call Analysis Reports/HR
          HR_CALL_ANALYSIS_SHAREPOINT_FILE_EXTENSIONS: .txt,.csv
          HR_CALL_ANALYSIS_STATE_PATH: /home/data/fleetpulse_hr_call_analysis.json
          DEPARTMENT_CALL_ANALYSIS_STATE_PATH: /home/data/fleetpulse_hr_call_analysis.json
          HR_CALL_ANALYSIS_ACTIVE_EXTENSIONS: 4,702,722,725
        run: |
          set -euo pipefail

          for required in \
            AZURE_KEY_VAULT_NAME \
            FLEETPULSE_GRAPH_TENANT_ID_SECRET_NAME \
            FLEETPULSE_GRAPH_CLIENT_ID_SECRET_NAME \
            FLEETPULSE_GRAPH_CLIENT_SECRET_SECRET_NAME
          do
            if [ -z "${!required:-}" ]; then
              echo "Missing ${required} repository secret."
              exit 1
            fi
          done

          bash scripts/configure_fleetpulse_feed_appsettings.sh

      - name: Smoke test
        run: |
          check_url() {
            local name="$1"
            local url="$2"
            local expected_status="${3:-200}"
            local status=""

            for attempt in $(seq 1 12); do
              status=$(curl --connect-timeout 5 --max-time 20 -sS -o /dev/null -w "%{http_code}" "$url" || true)
              echo "$name attempt $attempt status: $status"
              if [ "$status" = "$expected_status" ]; then
                return 0
              fi
              sleep 15
            done

            echo "$name smoke test failed after warm-up retries. Expected: $expected_status. Last status: $status"
            return 1
          }

          check_url "Health check" "https://${{ env.APP_NAME }}.azurewebsites.net/api/health"
          check_url "AI config auth gate" "https://${{ env.APP_NAME }}.azurewebsites.net/api/ai/config" "401"
          echo "Deployment successful!"
