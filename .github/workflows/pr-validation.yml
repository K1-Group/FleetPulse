name: PR Validation

on:
  pull_request:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run backend validation tests
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest
          PYTHONPATH=backend pytest \
            backend/tests/test_fabric_warehouse_sql_client.py \
            backend/tests/test_lakehouse_lane_stability_service.py \
            backend/tests/test_lane_stability_router.py \
            backend/tests/test_qbo_financial_snapshot_service.py \
            backend/tests/test_seat_kpi_feed_service.py \
            backend/tests/test_control_tower_router.py \
            backend/tests/test_hr_recruiting_service.py \
            backend/tests/test_hr_recruiting_router.py \
            backend/tests/test_hr_call_analysis_service.py \
            backend/tests/test_hr_call_analysis_router.py \
            backend/tests/test_auth_session_router.py \
            backend/tests/test_address_benchmark_service.py \
            backend/tests/test_address_benchmarks_router.py \
            backend/tests/test_ai_chat_config.py \
            backend/tests/test_fleet_hubs.py \
            backend/tests/test_app_monitor_startup.py

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
